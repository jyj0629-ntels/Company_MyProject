<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>항공권 통합 조회 도구</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 650px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .trip-type-group {
            display: flex;
            gap: 1.25rem;
            flex-wrap: nowrap;
            align-items: center;
            width: 100%;
            justify-content: flex-start;
            white-space: nowrap;
        }

        .trip-type-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            white-space: nowrap;
            flex-shrink: 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .airport-dropdown {
            position: relative;
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-top: none;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            z-index: 100;
            display: none;
        }

        .airport-dropdown.visible {
            display: block;
        }

        .airport-item {
            padding: 10px;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
        }

        .airport-item:last-child {
            border-bottom: none;
        }

        .airport-item:hover {
            background-color: #f0f8ff;
        }

        .airport-code {
            font-weight: 700;
            margin-right: 8px;
        }

        .airport-details {
            color: #555;
            font-size: 0.95em;
        }

        .info {
            font-size: 0.85em;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

    <div class="container">
        <H3><u> <center> <b> <font color="red" align="center">반드시 Chrome을 '시크릿 창'으로  띄우고 하기 값 진행.</font> </b> </center></u></H3>
        <h2>✈️ 항공권 통합 조회</h2>

        <div class="input-group">
            <label>출발지 (IATA 코드 또는 공항명 검색)</label>
            <input type="text" id="origin" placeholder="공항명, 도시, IATA 코드로 검색" autocomplete="off" value="SEL">
            <div class="airport-dropdown" id="originDropdown"></div>
        </div>

        <div class="input-group">
            <label>도착지 (IATA 코드 또는 공항명 검색)</label>
            <input type="text" id="destination" placeholder="공항명, 도시, IATA 코드로 검색" autocomplete="off">
            <div class="airport-dropdown" id="destinationDropdown"></div>
        </div>

        <div class="input-group">
            <label>여정 선택</label>
            <div class="trip-type-group">
                <label><input type="checkbox" id="roundtrip" checked> 왕복</label>
                <label><input type="checkbox" id="oneway"> 편도</label>
            </div>
        </div>

        <div class="input-group">
            <label>가는 날</label>
            <input type="date" id="depDate">
        </div>

        <div class="input-group">
            <label>오는 날</label>
            <input type="date" id="retDate">
        </div>

        <button onclick="searchFlights()">모든 사이트에서 조회하기</button>

    </div>

        function createAirportLabel(airport) {
            const koInfo = airport.koName ? `${airport.koName} (${airport.koCity})` : '';
            const enInfo = `${airport.name} (${airport.city}, ${airport.country})`;
            return koInfo ? `${airport.code} · ${koInfo} / ${enInfo}` : `${airport.code} · ${enInfo}`;
        }

        function searchAirports(query) {
            const normalized = query.trim().toUpperCase();
            if (!normalized) {
                return airports.slice(0, 12);
            }
            return airports.filter(airport => {
                return airport.code.includes(normalized)
                    || airport.name.toUpperCase().includes(normalized)
                    || airport.city.toUpperCase().includes(normalized)
                    || airport.country.toUpperCase().includes(normalized)
                    || (airport.koName && airport.koName.includes(query))
                    || (airport.koCity && airport.koCity.includes(query));
            }).slice(0, 20);
        }

        function renderDropdown(inputId, dropdownId, query) {
            const dropdown = document.getElementById(dropdownId);
            const results = searchAirports(query);
            dropdown.innerHTML = '';

            if (results.length === 0) {
                const item = document.createElement('div');
                item.className = 'airport-item';
                item.textContent = '검색 결과가 없습니다.';
                dropdown.appendChild(item);
                dropdown.classList.add('visible');
                return;
            }

            results.forEach(airport => {
                const item = document.createElement('div');
                item.className = 'airport-item';
                const koInfo = airport.koName ? `<span style="color: #333;">${airport.koName} (${airport.koCity})</span><br>` : '';
                const enInfo = `<span style="color: #666; font-size: 0.9em;">${airport.city}, ${airport.country} — ${airport.name}</span>`;
                item.innerHTML = `
                    <span class="airport-code">${airport.code}</span>
                    <span class="airport-details">${koInfo}${enInfo}</span>
                `;
                item.addEventListener('mousedown', function (event) {
                    event.preventDefault();
                    selectAirport(inputId, airport.code);
                });
                dropdown.appendChild(item);
            });
            dropdown.classList.add('visible');
        }

        function selectAirport(inputId, code) {
            const input = document.getElementById(inputId);
            input.value = code;
            const dropdown = document.getElementById(inputId + 'Dropdown');
            if (dropdown) dropdown.classList.remove('visible');
            input.focus();
        }

        function closeDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            if (dropdown) dropdown.classList.remove('visible');
        }

        function attachAirportSearch(inputId, dropdownId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);

            input.addEventListener('focus', () => {
                renderDropdown(inputId, dropdownId, input.value);
            });

            input.addEventListener('input', () => {
                renderDropdown(inputId, dropdownId, input.value);
            });

            input.addEventListener('blur', () => {
                setTimeout(() => closeDropdown(dropdownId), 150);
            });

            input.addEventListener('keydown', event => {
                if (event.key === 'Escape') {
                    closeDropdown(dropdownId);
                }
            });
        }

        function getAirportCode(value) {
            const normalized = value.trim();
            const codeMatch = normalized.toUpperCase().match(/^[A-Z]{3}$/);
            if (codeMatch) {
                return codeMatch[0];
            }
            const found = airports.find(airport => createAirportLabel(airport).toUpperCase().startsWith(normalized.toUpperCase()));
            if (found) {
                return found.code;
            }
            const partial = airports.find(airport => createAirportLabel(airport).toUpperCase().includes(normalized.toUpperCase()));
            return partial ? partial.code : '';
        }

        function updateTripTypeState(type) {
            const roundtripCheckbox = document.getElementById('roundtrip');
            const onewayCheckbox = document.getElementById('oneway');
            const retDateInput = document.getElementById('retDate');

            if (type === 'oneway') {
                roundtripCheckbox.checked = false;
                onewayCheckbox.checked = true;
                retDateInput.disabled = true;
                retDateInput.value = '';
            } else {
                roundtripCheckbox.checked = true;
                onewayCheckbox.checked = false;
                retDateInput.disabled = false;
            }
        }

        // 대신 새 탭으로 열도록 설정합니다.
        function searchFlights() {
            const originValue = document.getElementById('origin').value;
            const destValue = document.getElementById('destination').value;
            const origin = getAirportCode(originValue);
            const dest = getAirportCode(destValue);
            const depDate = document.getElementById('depDate').value;
            const retDate = document.getElementById('retDate').value;
            const tripType = document.getElementById('oneway').checked ? 'ONEWAY' : 'ROUNDTRIP';

            if (!origin || !dest || !depDate || (tripType === 'ROUNDTRIP' && !retDate)) {
                alert('모든 정보를 입력해주세요. 공항 검색 결과에서 공항을 선택하거나 IATA 코드를 입력하세요.');
                return;
            }

            const depDateYYYYMMDD = depDate.replace(/-/g, '');
            const depDateYYMMDD = depDateYYYYMMDD.slice(2);
            const retDateYYYYMMDD = retDate ? retDate.replace(/-/g, '') : '';

            console.log('검색 정보:', { origin, dest, depDate, retDate, tripType });

            const skyscannerUrl = tripType === 'ROUNDTRIP'
                ? `https://www.skyscanner.co.kr/transport/flights/${origin.toLowerCase()}/${dest.toLowerCase()}/${depDateYYMMDD}/?adultsv2=1&cabinclass=economy&childrenv2=&inboundaltsenabled=false&outboundaltsenabled=false&preferdirects=true&rtn=1#/results`
                : `https://www.skyscanner.co.kr/transport/flights/${origin.toLowerCase()}/${dest.toLowerCase()}/${depDateYYMMDD}/?adultsv2=1&cabinclass=economy&childrenv2=&inboundaltsenabled=false&outboundaltsenabled=false&preferdirects=true&rtn=0#/results`;
            console.log('스카이스캐너:', skyscannerUrl);
            window.open(skyscannerUrl, '_blank', 'noopener,noreferrer');

            const bookingUrl = tripType === 'ROUNDTRIP'
                ? `https://flights.booking.com/flights/${origin}.CITY-${dest}.AIRPORT/?type=ROUNDTRIP&adults=1&cabinClass=ECONOMY&children=&from=${origin}.CITY&to=${dest}.AIRPORT&stops=0&depart=${depDate}&return=${retDate}&sort=CHEAPEST&travelPurpose=leisure`
                : `https://flights.booking.com/flights/${origin}.CITY-${dest}.AIRPORT/?type=ONEWAY&adults=1&cabinClass=ECONOMY&children=&from=${origin}.CITY&to=${dest}.AIRPORT&stops=0&depart=${depDate}&sort=CHEAPEST&travelPurpose=leisure`;
            console.log('부킹닷컴:', bookingUrl);
            window.open(bookingUrl, '_blank', 'noopener,noreferrer');

            const naverUrl = tripType === 'ROUNDTRIP'
                ? `https://flight.naver.com/flights/international/${origin}:city-${dest}:city-${depDateYYYYMMDD}/${dest}:city-${origin}:city-${retDateYYYYMMDD}?adult=1&isDirect=true&fareType=Y`
                : `https://flight.naver.com/flights/international/${origin}:city-${dest}:city-${depDateYYYYMMDD}?adult=1&isDirect=true&fareType=Y`;
            console.log('네이버:', naverUrl);
            window.open(naverUrl, '_blank', 'noopener,noreferrer');

            const googleUrl = tripType === 'ROUNDTRIP'
                ? 'https://www.google.com/travel/flights/search?tfs=CBwQAholEgoyMDI2LTA1LTIyKABqDAgCEggvbS8waHNxZnIHCAESA0NHSxolEgoyMDI2LTA1LTMxKABqBwgBEgNDR0tyDAgCEggvbS8waHNxZkABSAFwAYIBCwj___________8BmAEB&tfu=EgYIAhAAGAA&hl=ko&gl=KR'
                : `https://www.google.com/travel/flights/search?hl=ko&gl=KR&tfu=EgYIAhAAGAA&q=${encodeURIComponent(`cheapest direct flights from ${origin} to ${dest} on ${depDate}`)}`;
            console.log('구글:', googleUrl);
            window.open(googleUrl, '_blank', 'noopener,noreferrer');
        }

        document.addEventListener('DOMContentLoaded', function () {
            attachAirportSearch('origin', 'originDropdown');
            attachAirportSearch('destination', 'destinationDropdown');

            document.getElementById('roundtrip').addEventListener('change', function () {
                if (this.checked) {
                    updateTripTypeState('roundtrip');
                } else if (!document.getElementById('oneway').checked) {
                    updateTripTypeState('roundtrip');
                }
            });

            document.getElementById('oneway').addEventListener('change', function () {
                if (this.checked) {
                    updateTripTypeState('oneway');
                } else if (!document.getElementById('roundtrip').checked) {
                    updateTripTypeState('roundtrip');
                }
            });

            updateTripTypeState('roundtrip');
        });
